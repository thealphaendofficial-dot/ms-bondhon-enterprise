<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Bondhon Enterprise - Login/Register</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f7f7f7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 420px; border-top: 5px solid #E60000; }
        h2 { color: #E60000; margin: 0 0 5px 0; }
        p { color: #555; font-size: 14px; margin-bottom: 20px; }
        input[type="email"], input[type="text"], input[type="password"], select, input[type="file"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input[type="submit"] { width: 100%; background-color: #E60000; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input[type="submit"]:hover { background-color: #cc0000; }
        .link-btn { display: inline-block; margin-top: 15px; color: #0084ff; text-decoration: none; font-size: 14px; font-weight: bold; cursor: pointer; }
        .label-text { text-align: left; display: block; font-size: 13px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>MS Bondhon Enterprise</h2>
        <p>Robi Distributor House | Grid Management</p>
        
        {% if step == 'login' %}
        <form method="post" action="/">
            <input type="email" name="email" placeholder="আপনার নিবন্ধিত জিমেইল দিন" required>
            <input type="submit" value="জিমেইলে OTP পাঠান">
        </form>
        <a class="link-btn" href="/register">🆕 নতুন অ্যাকাউন্ট তৈরি করুন (DSO/DSR)</a><br>
        <a class="link-btn" href="/admin_login" style="color: #333;">💼 বসের প্যানেল (বিনা ওটিপি)</a>
        
        {% elif step == 'register' %}
        <form method="post" action="/register" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="আপনার সম্পূর্ণ নাম (বাধ্যতামূলক)" required>
            <input type="text" name="mobile" placeholder="মোবাইল নম্বর (বাধ্যতামূলক)" required>
            <input type="email" name="email" placeholder="জিমেইল অ্যাকাউন্ট (বাধ্যতামূলক)" required>
            <select name="user_role">
                <option value="DSO">আমি একজন DSO</option>
                <option value="DSR">আমি একজন DSR</option>
            </select>
            <span class="label-text">প্রোফাইল ছবি (ঐচ্ছিক):</span>
            <input type="file" name="profile_pic" accept="image/*">
            <input type="submit" value="নিবন্ধন ও ওটিপি পাঠান">
        </form>
        <a class="link-btn" href="/">← লগইন পেজে ফিরুন</a>
        
        {% elif step == 'admin' %}
        <form method="post" action="/admin_login">
            <input type="password" name="password" placeholder="ম্যানেজমেন্ট গোপন পাসওয়ার্ড দিন" required>
            <select name="user_role">
                <option value="Boss">বস (Owner)</option>
                <option value="Manager">ম্যানেজার</option>
                <option value="Supervisor">সুপারভাইজার</option>
            </select>
            <input type="submit" value="ড্যাশবোর্ডে প্রবেশ করুন">
        </form>
        <a class="link-btn" href="/">← DSO / DSR লগইন</a>
        
        {% else %}
        <form method="post" action="/verify">
            <input type="text" name="otp" placeholder="৬ ডিজিটের OTP কোড দিন" required>
            <input type="submit" value="ভেরিফাই ও লগইন">
        </form>
        {% endif %}
    </div>
</body>
</html>
